name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Library
        run: ./gradlew :library:assembleRelease

      - name: Build Sample
        run: ./gradlew :sample:assembleDebug

      - name: Run Lint
        run: ./gradlew :library:lint

      - name: Unit Tests
        run: ./gradlew :library:test
