name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Library
        run: ./gradlew :library:assembleRelease

      - name: Build Sample APK (Debug)
        run: ./gradlew :sample:assembleDebug

      - name: Build Sample APK (Release)
        run: ./gradlew :sample:assembleRelease

      - name: Run Lint
        run: ./gradlew :library:lint --continue

      - name: Unit Tests
        run: ./gradlew :library:test --continue

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ios-glass-sample-debug
          path: sample/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ios-glass-sample-release
          path: sample/build/outputs/apk/release/*.apk
          retention-days: 30
