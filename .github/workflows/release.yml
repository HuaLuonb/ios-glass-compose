name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build Release APK
        run: ./gradlew :sample:assembleRelease

      - name: Build Debug APK
        run: ./gradlew :sample:assembleDebug

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "iOS Glass Compose ${{ github.ref_name }}"
          body: |
            ## 🪟 iOS Glass Compose ${{ github.ref_name }}

            基于 Jetpack Compose 的 iOS 26 Liquid Glass UI 组件库。

            ### ✨ 特性
            - 🪟 Liquid Glass 毛玻璃材质引擎 (GPU 加速)
            - 🎭 UIKit 弹簧动画系统
            - 📱 40+ iOS 组件
            - 🌗 完整 Light/Dark 主题

            ### 📱 示例 APK
            - **sample-release.apk** — Release 版本 (推荐)
            - **sample-debug.apk** — Debug 版本

            ### 🚀 使用
            ```kotlin
            dependencies {
                implementation(project(":library"))
            }
            ```

            ### 📖 文档
            - [English README](https://github.com/HuaLuonb/ios-glass-compose/blob/main/README.md)
            - [中文文档](https://github.com/HuaLuonb/ios-glass-compose/blob/main/README_CN.md)
          files: |
            sample/build/outputs/apk/release/*.apk
            sample/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
